server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: script-src includes self + Google AdSense domains
    # style-src unsafe-inline required for inline style="" attributes and JS style manipulation
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com; script-src 'self' https://pagead2.googlesyndication.com https://www.googletagservices.com https://adservice.google.com; connect-src 'self' https://pagead2.googlesyndication.com; img-src 'self' data: https://pagead2.googlesyndication.com; font-src 'self'; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Cache static assets
    # NOTE: Using only 'expires' (not add_header) to preserve security header
    # inheritance from the parent server block. nginx drops ALL parent add_header
    # directives when a child location defines its own add_header.
    location ~* \.(js|css)$ {
        expires 1d;
    }

    # SPA fallback — serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
